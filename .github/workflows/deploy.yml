name: Deploy WordPress Plugin

# Deploys tagged releases to WordPress.org SVN and attaches razuna-dam.zip to
# the matching GitHub Release.
# Tag the release to match razuna.php and readme.txt "Stable tag", e.g.:
#   git tag 1.2.0 && git push origin 1.2.0
# Files matched by .distignore are excluded from the shipped plugin.

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          plugin_version="$(awk -F': *' '/^[[:space:]]+\* Version:/ { print $2; exit }' razuna.php)"
          stable_tag="$(awk -F': *' '/^Stable tag:/ { print $2; exit }' readme.txt)"
          if [ "$tag" != "$plugin_version" ]; then
            echo "Tag $tag does not match razuna.php Version $plugin_version."
            exit 1
          fi
          if [ "$tag" != "$stable_tag" ]; then
            echo "Tag $tag does not match readme.txt Stable tag $stable_tag."
            exit 1
          fi

      - name: Package plugin
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/razuna-dam"
          rsync -a --delete --exclude-from=.distignore ./ "$RUNNER_TEMP/razuna-dam/"
          cd "$RUNNER_TEMP"
          zip -r "$GITHUB_WORKSPACE/razuna-dam.zip" razuna-dam

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: razuna-dam
          path: ${{ github.workspace }}/razuna-dam.zip

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: razuna-dam

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$GITHUB_WORKSPACE/razuna-dam.zip" --clobber
          else
            gh release create "$RELEASE_TAG" "$GITHUB_WORKSPACE/razuna-dam.zip" --verify-tag --title "Razuna DAM $RELEASE_TAG" --notes "WordPress plugin ZIP for Razuna DAM $RELEASE_TAG."
          fi
