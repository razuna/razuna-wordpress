name: Build WordPress Plugin ZIP

# Builds a tagged release ZIP for WordPress.org submission/manual install.
# Tag the release to match readme.txt "Stable tag", e.g.:
#   git tag 1.0.0 && git push origin 1.0.0
#
# WordPress.org SVN deployment can be restored after the plugin is approved.
# Files matched by .distignore are excluded from the shipped plugin.

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build_zip:
    name: Build release ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package plugin
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/razuna-dam"
          rsync -a --delete --exclude-from=.distignore ./ "$RUNNER_TEMP/razuna-dam/"
          cd "$RUNNER_TEMP"
          zip -r "$GITHUB_WORKSPACE/razuna-dam.zip" razuna-dam

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: razuna-dam
          path: ${{ github.workspace }}/razuna-dam.zip
